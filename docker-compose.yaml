services:
  postgres:
    container_name: postgres-lumar
    image: postgres:16-alpine3.22
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 5432:5432
    volumes:
      - ./dbvolume:/var/lib/postgresql/data
  backend:
    container_name: back-lumar
    image: node:20
    working_dir: /app
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./nestjsLumar:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start:dev"
    ports:
      - 3000:3000
